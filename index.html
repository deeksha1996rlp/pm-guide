<style>
/* ═══ DESIGN TOKENS ═══ */
:root{
  --white:#ffffff;--off-white:#fafaf9;--light:#f5f3ff;
  --bg:#ffffff;--text:#0f0e17;--muted:#6b7280;
  --border:#e5e7eb;--border-soft:#f0f0f0;
  --indigo:hsl(244 76% 59%);--indigo-d:#3730a3;--indigo-l:#818cf8;
  --violet:hsl(263 70% 55%);--pink:hsl(330 81% 60%);
  --coral:hsl(21 94% 53%);--emerald:hsl(160 84% 39%);
  --emerald-l:#d1fae5;--amber:#f59e0b;--amber-l:#fef3c7;
  --serif:'Fraunces',Georgia,serif;
  --sans:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --footer-bg:#0f0e17;
}

/* ═══ RESET ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:16px;line-height:1.75;overflow-x:hidden}

/* ═══ PAGE TRANSITION ═══ */
body{animation:pageIn .5s cubic-bezier(.22,1,.36,1) both}
@keyframes pageIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.page-out{animation:pageOut .3s ease forwards!important}
@keyframes pageOut{to{opacity:0;transform:translateY(-12px)}}

/* ═══ SCROLL PROGRESS ═══ */
#scroll-progress{position:fixed;top:0;left:0;height:3px;z-index:9999;width:0%;transition:width .1s linear;pointer-events:none}

/* ═══ NAV ═══ */
nav{position:fixed;top:0;left:0;right:0;z-index:500;height:64px;padding:0 2.5rem;display:flex;align-items:center;gap:1rem;background:rgba(255,255,255,0);backdrop-filter:blur(0);transition:all .3s}
nav.scrolled{background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);box-shadow:0 2px 20px rgba(0,0,0,0.06)}
.nav-brand{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--text);text-decoration:none;margin-right:auto;letter-spacing:-0.02em}
.nav-brand em{color:var(--indigo);font-style:italic}
.nav-links{display:flex;gap:0;overflow-x:auto;flex:1;justify-content:center}
.nav-links::-webkit-scrollbar{height:0}
nav a.nl{color:var(--muted);font-size:12px;font-weight:500;text-decoration:none;padding:8px 10px;transition:color .2s;white-space:nowrap}
nav a.nl:hover,nav a.nl.active{color:var(--indigo)}
.nav-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.6);color:var(--text);font-size:13px;font-weight:600;padding:8px 20px;border-radius:99px;border:1.5px solid rgba(0,0,0,.1);cursor:pointer;transition:all .2s;flex-shrink:0}
.nav-pill:hover{background:rgba(255,255,255,0.9)}
.nav-cta{display:inline-flex;align-items:center;gap:6px;background:var(--indigo);color:#fff;font-size:13px;font-weight:700;padding:8px 22px;border-radius:99px;text-decoration:none;transition:all .2s;flex-shrink:0;box-shadow:0 2px 12px rgba(79,70,229,.2)}
.nav-cta:hover{background:var(--indigo-d);transform:translateY(-1px)}
@media(max-width:900px){.nav-links{display:none}}

/* ═══ CURSOR GLOW ═══ */
#cursor-glow{position:fixed;width:350px;height:350px;border-radius:50%;pointer-events:none;z-index:0;transform:translate(-50%,-50%);transition:left .15s ease,top .15s ease;opacity:.7}

/* ═══ PAGE HERO (each page has own colours) ═══ */
.page-hero{min-height:92vh;display:flex;align-items:center;position:relative;overflow:hidden;padding-top:64px}
.page-hero-inner{max-width:1200px;margin:0 auto;padding:4rem 3rem;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;width:100%;position:relative;z-index:2}
@media(max-width:768px){.page-hero-inner{grid-template-columns:1fr;padding:3rem 2rem}}
.page-kicker{font-family:var(--mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:8px}
.page-kicker::before{content:'';width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulseDot 2s infinite}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.page-h1{font-family:var(--serif);font-size:clamp(3rem,7vw,6rem);font-weight:300;line-height:.95;letter-spacing:-0.02em;margin-bottom:0}
.page-h1 em{display:block;font-style:italic}
.page-sub{font-size:16px;max-width:440px;line-height:1.8;margin:2rem 0 2.5rem;font-weight:300}
.page-btn{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:700;padding:14px 28px;border-radius:99px;text-decoration:none;transition:all .2s}

/* ═══ SCROLL INDICATOR ═══ */
.scroll-ind{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:3}
.scroll-ind span{font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase}
.scroll-line{width:1px;height:36px;animation:scrollDrop 2s ease-in-out infinite}
@keyframes scrollDrop{0%{transform:scaleY(0);transform-origin:top;opacity:0}45%{transform:scaleY(1);transform-origin:top;opacity:1}46%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom;opacity:0}}

/* ═══ CONTENT SECTIONS ═══ */
.content-section{padding:5rem 3rem;border-bottom:1px solid var(--border)}
.content-section:nth-child(even){background:var(--off-white)}
.cs-inner{max-width:900px;margin:0 auto}
.cs-kicker{font-family:var(--mono);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--coral);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.cs-kicker::before{content:'';width:16px;height:2px;background:var(--coral);border-radius:2px}
.cs-h3{font-family:var(--serif);font-size:1.25rem;font-weight:700;color:var(--text);margin:2rem 0 .5rem;letter-spacing:-.01em}
.cs-h2{font-family:var(--serif);font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:300;color:var(--text);letter-spacing:-0.02em;margin-bottom:1.5rem}
.cs-h2 em{color:var(--indigo);font-style:italic}
.cs-p{color:#374151;font-size:15px;line-height:1.9;margin-bottom:1.25rem}

/* ═══ CARDS ═══ */
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin:2.5rem 0}
.card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:1.75rem;transition:all .25s;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.card:hover{border-color:var(--indigo);box-shadow:0 8px 32px rgba(79,70,229,0.1);transform:translateY(-3px)}
.card-icon{font-size:1.75rem;margin-bottom:1rem;display:block}
.card h4{font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:8px}
.card p{font-size:13px;color:var(--muted);margin:0;line-height:1.7}

/* ═══ INSIGHT / LENS BOXES ═══ */
.insight-box{background:var(--emerald-l);border-left:3px solid var(--emerald);border-radius:0 10px 10px 0;padding:1.5rem 2rem;margin:2rem 0}
.insight-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--emerald);margin-bottom:8px}
.insight-box p{color:#065f46;font-size:14px;margin:0;line-height:1.8}
.lens-box{background:var(--light);border-left:3px solid var(--indigo);border-radius:0 10px 10px 0;padding:1.5rem 2rem;margin:2rem 0}
.lens-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--indigo);margin-bottom:8px}
.lens-box p{color:#3730a3;font-size:14px;margin:0;font-style:italic;line-height:1.85}
.warning-box{background:var(--amber-l);border-left:3px solid var(--amber);border-radius:0 10px 10px 0;padding:1.5rem 2rem;margin:2rem 0}
.warning-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#92400e;margin-bottom:8px}
.warning-box p{color:#78350f;font-size:14px;margin:0;line-height:1.8}

/* ═══ VIDEO EMBED ═══ */
.video-wrap{margin:2.5rem 0}
.video-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--coral);background:rgba(249,115,22,0.1);display:inline-block;padding:4px 10px;border-radius:6px;margin-bottom:.75rem}
.video-frame{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.video-frame iframe{position:absolute;top:0;left:0;width:100%;height:100%}
.video-caption{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.6}

/* ═══ BLOCKQUOTE ═══ */
blockquote{font-family:var(--serif);font-size:1.4rem;font-style:italic;color:var(--indigo);border-left:3px solid var(--indigo);padding:.5rem 0 .5rem 2rem;margin:2rem 0;line-height:1.5;font-weight:300}
blockquote cite{display:block;font-size:12px;font-style:normal;color:var(--muted);margin-top:8px;font-family:var(--mono)}

/* ═══ TABLE ═══ */
.table-wrap{overflow-x:auto;margin:2rem 0;border:1px solid var(--border);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--footer-bg);color:rgba(255,255,255,0.7);text-align:left;padding:12px 16px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase}
td{padding:11px 16px;border-bottom:1px solid var(--border);color:#374151}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--light)}
td strong{color:var(--text);font-weight:700}

/* ═══ FOOTER ═══ */
footer{background:var(--footer-bg);padding:4rem 3rem;color:rgba(255,255,255,0.45)}
.footer-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 2fr;gap:4rem}
@media(max-width:700px){.footer-inner{grid-template-columns:1fr}}
.footer-brand{font-family:var(--serif);font-size:1.8rem;font-weight:300;color:#fff;font-style:italic;margin-bottom:.75rem}
.footer-sub{font-size:13px;line-height:1.7;margin-bottom:1.5rem}
.footer-nav{display:flex;flex-direction:column;gap:8px}
.footer-nav a{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.4);text-decoration:none;letter-spacing:0.06em;transition:color .2s}
.footer-nav a:hover{color:rgba(255,255,255,0.8)}
.footer-copy{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,0.25);margin-top:2rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.08)}

/* ═══ REVEAL ANIMATIONS ═══ */
.reveal{opacity:0;transform:translateY(40px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.reveal.visible{opacity:1;transform:none}
.reveal-left{opacity:0;transform:translateX(-30px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.reveal-left.visible{opacity:1;transform:none}
.reveal-scale{opacity:0;transform:scale(.95);transition:opacity .6s ease,transform .6s ease}
.reveal-scale.visible{opacity:1;transform:scale(1)}
.stagger>*{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}
.stagger.visible>*:nth-child(1){opacity:1;transform:none;transition-delay:.05s}
.stagger.visible>*:nth-child(2){opacity:1;transform:none;transition-delay:.10s}
.stagger.visible>*:nth-child(3){opacity:1;transform:none;transition-delay:.15s}
.stagger.visible>*:nth-child(4){opacity:1;transform:none;transition-delay:.20s}
.stagger.visible>*:nth-child(5){opacity:1;transform:none;transition-delay:.25s}
.stagger.visible>*:nth-child(6){opacity:1;transform:none;transition-delay:.30s}
.stagger.visible>*:nth-child(7){opacity:1;transform:none;transition-delay:.35s}
.stagger.visible>*:nth-child(8){opacity:1;transform:none;transition-delay:.40s}
.stagger.visible>*:nth-child(9){opacity:1;transform:none;transition-delay:.45s}
.stagger.visible>*:nth-child(10){opacity:1;transform:none;transition-delay:.50s}
.stagger.visible>*:nth-child(11){opacity:1;transform:none;transition-delay:.55s}
.stagger.visible>*:nth-child(12){opacity:1;transform:none;transition-delay:.60s}
.stagger.visible>*:nth-child(13){opacity:1;transform:none;transition-delay:.65s}
.stagger.visible>*:nth-child(14){opacity:1;transform:none;transition-delay:.70s}
.stagger.visible>*:nth-child(15){opacity:1;transform:none;transition-delay:.75s}

/* ═══ SPA SYSTEM ═══ */
body{overflow:hidden;height:100vh}
.spa-page{position:fixed;inset:0;opacity:0;pointer-events:none;transform:translateY(30px);transition:opacity .45s cubic-bezier(.22,1,.36,1),transform .45s cubic-bezier(.22,1,.36,1);z-index:1}
.spa-page.active{opacity:1;pointer-events:all;transform:translateY(0);z-index:2}
.spa-page.exit{opacity:0;transform:translateY(-20px);transition:opacity .3s ease,transform .3s ease}
.spa-scroll{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding-top:64px}
.spa-scroll::-webkit-scrollbar{width:4px}
.spa-scroll::-webkit-scrollbar-track{background:transparent}
.spa-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}

/* Home hero overrides */
.hero{min-height:88vh;padding-top:0}

/* Page hero */
.ph{min-height:88vh;display:flex;align-items:center;position:relative;overflow:hidden}
.ph-inner{max-width:1200px;margin:0 auto;padding:3rem 3rem;display:grid;grid-template-columns:1.1fr 1fr;gap:4rem;align-items:center;width:100%;position:relative;z-index:2}
@media(max-width:768px){.ph-inner{grid-template-columns:1fr;padding:2rem}}
.pk{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--pa,hsl(244 76% 59%));margin-bottom:1.5rem;display:flex;align-items:center;gap:8px}
.pk::before{content:'';width:8px;height:8px;background:var(--pa,hsl(244 76% 59%));border-radius:50%;animation:pulseDot 2s infinite}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.ph1{font-family:var(--serif);font-size:clamp(2.8rem,6vw,5.5rem);font-weight:300;line-height:.93;letter-spacing:-.025em;color:#0f0e17}
.ph1 em{display:block;font-style:italic;color:var(--pa,hsl(244 76% 59%))}
.ps{font-size:15px;color:rgba(15,14,23,.62);max-width:440px;line-height:1.8;margin:1.75rem 0 2rem;font-weight:300}
.btn-pa{display:inline-flex;align-items:center;gap:8px;background:var(--pa,hsl(244 76% 59%));color:#fff;font-size:14px;font-weight:700;padding:13px 26px;border-radius:99px;border:none;cursor:pointer;transition:all .2s;flex-shrink:0}
.btn-pa:hover{filter:brightness(1.1);transform:translateY(-2px)}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.6);color:#374151;font-size:14px;font-weight:600;padding:13px 26px;border-radius:99px;border:1.5px solid rgba(0,0,0,.1);cursor:pointer;transition:all .2s;flex-shrink:0}
.btn-ghost:hover{background:rgba(255,255,255,.85)}
.scroll-ind{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;z-index:3;color:rgba(15,14,23,.3)}
.scroll-ind span{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase}
.scroll-line{width:1px;height:36px;animation:scrollDrop 2s ease-in-out infinite}
@keyframes scrollDrop{0%{transform:scaleY(0);transform-origin:top;opacity:0}45%{transform:scaleY(1);transform-origin:top;opacity:1}46%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom;opacity:0}}

/* Content */
.content-wrap{}
.content-section{padding:4rem 3rem;border-bottom:1px solid var(--border)}
.content-section:nth-child(even){background:var(--off-white)}
.cs-inner{max-width:900px;margin:0 auto}
.ck{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--pa,var(--coral));margin-bottom:.875rem;display:flex;align-items:center;gap:8px}
.ck::before{content:'';width:16px;height:2px;background:var(--pa,var(--coral));border-radius:2px}
.ch2{font-family:var(--serif);font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:300;color:var(--text);letter-spacing:-.02em;margin-bottom:1.25rem}
.ch2 em{color:var(--pa,var(--indigo));font-style:italic}
.cs-p{color:#374151;font-size:15px;line-height:1.9;margin-bottom:1.25rem}
.insight-box{background:var(--emerald-l);border-left:3px solid var(--emerald);border-radius:0 10px 10px 0;padding:1.5rem 2rem;margin:2rem 0}
.insight-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--emerald);margin-bottom:8px}
.insight-box p{color:#065f46;font-size:14px;margin:0;line-height:1.8}
.lb{background:rgba(79,70,229,.05);border-left:3px solid var(--pa,var(--indigo));border-radius:0 10px 10px 0;padding:1.5rem 2rem;margin:2rem 0}
.lb-l{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--pa,var(--indigo));margin-bottom:8px}
.lb p{color:var(--pa2,#3730a3);font-size:14px;margin:0;font-style:italic;line-height:1.85}
.pnav{display:flex;justify-content:space-between;align-items:center;padding:2rem 0;border-top:1px solid var(--border);margin-top:2rem}
.pnl{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--pa,var(--indigo));background:none;border:none;cursor:pointer;transition:gap .2s;text-decoration:none}
.pnl:hover{gap:12px}
.pnh{font-family:var(--mono);font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;letter-spacing:.06em}
.pnh:hover{color:var(--pa,var(--indigo))}
.video-wrap{margin:2rem 0}
.video-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--coral);background:rgba(249,115,22,.1);display:inline-block;padding:4px 10px;border-radius:6px;margin-bottom:.75rem}
.video-frame{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.video-frame iframe{position:absolute;top:0;left:0;width:100%;height:100%}

/* Quiz */
.quiz-progress-bar{background:var(--border);height:3px;border-radius:99px;margin-bottom:2rem;overflow:hidden}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,hsl(244 76% 59%),hsl(263 70% 55%));border-radius:99px;transition:width .4s ease;width:0%}
.quiz-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:2.5rem;border-top:3px solid hsl(244 76% 59%);box-shadow:0 4px 24px rgba(79,70,229,.08)}
.quiz-q-num{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:hsl(244 76% 59%);margin-bottom:12px}

.rotating-stats-section{background:#eef0fb;padding:5rem 3rem;overflow:hidden}
.rotating-stats-inner{max-width:640px;margin:0 auto;text-align:center}
.rst-heading{font-family:var(--serif);font-size:clamp(2.2rem,5vw,3.5rem);font-weight:400;color:#0f0e17;letter-spacing:-.03em;margin-bottom:.75rem;line-height:1.1}
.rst-heading em{font-style:italic;color:hsl(244 76% 59%)}
.rst-subhead{font-size:17px;color:rgba(15,14,23,.55);margin-bottom:3rem;font-weight:300;line-height:1.6}
.rst-stage{perspective:1000px;margin-bottom:2rem}
.rst-track{position:relative;height:320px}
/* Exact Lovable card: white card, double top border (indigo + coral), shadow, rounded */
.rst-card{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#fff;
  border-radius:20px;
  padding:3rem 2.5rem;
  box-shadow:0 20px 60px rgba(79,70,229,.12),0 4px 16px rgba(0,0,0,.06);
  opacity:0;transform:rotateX(40deg) scale(.88) translateY(20px);
  transition:all .65s cubic-bezier(.22,1,.36,1);
  pointer-events:none;transform-origin:50% 130%;
  /* Double top border — exact Lovable */
  border-top:4px solid hsl(244 76% 59%);
  outline:3px solid hsl(21 94% 53%);
  outline-offset:-7px;
}
.rst-card.active{opacity:1;transform:rotateX(0deg) scale(1) translateY(0);pointer-events:all}
.rst-card.exit{opacity:0;transform:rotateX(-35deg) scale(.9) translateY(-20px);transform-origin:50% -20%}
/* Big coral number — exact Lovable */
.rst-n{font-family:var(--serif);font-size:clamp(4rem,10vw,6rem);font-weight:700;color:hsl(21 94% 53%);line-height:1;letter-spacing:-.03em;margin-bottom:1rem}
.rst-l{font-size:17px;color:rgba(15,14,23,.72);line-height:1.55;font-weight:400;max-width:420px;margin:0 auto .875rem}
.rst-s{font-family:var(--mono);font-size:10px;color:rgba(15,14,23,.38);letter-spacing:.12em;text-transform:uppercase}
/* Dots: wide pill for active, small circle for inactive — exact Lovable */
.rst-dots{display:flex;gap:8px;justify-content:center;align-items:center}
.rst-dot{height:10px;border-radius:99px;background:rgba(79,70,229,.18);cursor:pointer;transition:all .35s;border:none;padding:0;width:10px}
.rst-dot.active{background:hsl(244 76% 59%);width:32px}

/* ══ PM IN PRACTICE (Lovable: image showcase) ══ */
.pm-practice-section{padding:5rem 3rem;background:#fff;overflow:hidden}
.pmp-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center}
@media(max-width:900px){.pmp-inner{grid-template-columns:1fr}}
.pmp-visual{position:relative;height:380px}
.pmp-blob{position:absolute;inset:-2rem;background:linear-gradient(135deg,rgba(79,70,229,.08),rgba(249,115,22,.06),rgba(124,58,237,.06));border-radius:40%;filter:blur(40px);animation:blobPulse 8s ease-in-out infinite}
@keyframes blobPulse{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.05) rotate(3deg)}}
.pmp-illustration{position:relative;z-index:1;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.pmp-svg{width:100%;max-width:420px;height:auto;filter:drop-shadow(0 20px 40px rgba(79,70,229,.12));animation:floatYSlow 8s ease-in-out infinite}
@keyframes floatYSlow{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.pmp-kicker{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:hsl(21 94% 53%);display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
.pmp-kicker::before{content:'';width:20px;height:2px;background:hsl(21 94% 53%);border-radius:2px}
.pmp-h2{font-family:var(--serif);font-size:clamp(2rem,4vw,3.2rem);font-weight:300;color:#0f0e17;letter-spacing:-.02em;line-height:1.1;margin-bottom:1.5rem}
.pmp-h2 em{font-style:italic;color:hsl(244 76% 59%)}
.pmp-p{font-size:16px;color:rgba(15,14,23,.65);line-height:1.8;margin-bottom:2rem;font-weight:300}
.pmp-mini-stats{display:flex;gap:2rem;flex-wrap:wrap}
.pmp-stat-n{font-family:var(--serif);font-size:2.4rem;font-weight:700;line-height:1;letter-spacing:-.02em}
.pmp-stat-l{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(15,14,23,.4);margin-top:4px}

/* ══ AMBIENT BLOBS (Lovable: ECCSR section backdrop) ══ */
.ambient-blob{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;animation:ambientPulse 10s ease-in-out infinite}
.ambient-blob.indigo{background:radial-gradient(circle,rgba(79,70,229,.18),transparent 70%)}
.ambient-blob.coral{background:radial-gradient(circle,rgba(249,115,22,.14),transparent 70%)}
.ambient-blob.violet{background:radial-gradient(circle,rgba(124,58,237,.12),transparent 70%)}
@keyframes ambientPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.15);opacity:1}}
.ambient-ring{position:absolute;border-radius:50%;border:1.5px solid rgba(79,70,229,.12);pointer-events:none;animation:spinSlow 20s linear infinite}
@keyframes spinSlow{to{transform:rotate(360deg)}}

/* ══ PILLAR CARD SPINNING RING (Lovable: inside each pillar card) ══ */
.pillar-spin-ring{position:absolute;top:-24px;right:-24px;width:120px;height:120px;border-radius:50%;opacity:.18;animation:spinSlow 16s linear infinite}

/* ══ ECCSR LETTER FLOAT ANIMATIONS ══ */
@keyframes letterFloat0{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes letterFloat1{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes letterFloat2{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes letterFloat3{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes letterFloat4{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ══ PM LIFECYCLE ANIMATED CARDS (Lovable: animated pulse + arrows) ══ */
.lc-card{border-radius:12px;padding:1.25rem;text-align:center;color:white;position:relative;overflow:hidden;transition:transform .25s}
.lc-card:hover{transform:translateY(-6px) scale(1.05)}
.lc-halo{position:absolute;top:-32px;right:-32px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.18);animation:spinSlow 18s linear infinite}
.lc-num{font-family:var(--serif);font-size:2rem;font-weight:700;line-height:1;position:relative;z-index:1}
.lc-name{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-top:6px;position:relative;z-index:1}
.lc-arrow{color:rgba(15,14,23,.3);font-size:1.2rem;display:flex;align-items:center;animation:arrowBounce 1.6s ease-in-out infinite}
@keyframes arrowBounce{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}
.lc-num-anim{display:inline-block;animation:numPulse 2.4s ease-in-out infinite}
@keyframes numPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

.eccsr-step-card{
  width:110px;flex-shrink:0;
  background:var(--sb,hsl(244 76% 95%));
  border:2px solid var(--sc,hsl(244 76% 59%));
  border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding-top:12px;gap:2px;
  cursor:pointer;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:visible;
}
.eccsr-step-card:hover{transform:translateY(-6px) scale(1.04);box-shadow:0 12px 32px rgba(79,70,229,.18);z-index:10}
.eccsr-step-card.active{transform:translateY(-8px) scale(1.06);box-shadow:0 16px 40px rgba(79,70,229,.22);z-index:20}
.esc-letter{font-family:'Fraunces',Georgia,serif;font-size:2.4rem;font-weight:900;line-height:1;color:var(--sc,hsl(244 76% 59%));transition:transform .3s}
.eccsr-step-card:hover .esc-letter,.eccsr-step-card.active .esc-letter{transform:scale(1.15)}
.esc-word{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(15,14,23,.5);text-align:center;padding:0 6px;line-height:1.1}
.esc-detail{
  position:absolute;
  bottom:calc(100% + 14px);
  left:50%;
  width:230px;
  background:#fff;
  border:1.5px solid var(--sc,hsl(244 76% 59%));
  border-radius:12px;
  padding:14px 16px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:rgba(15,14,23,.78);line-height:1.65;
  box-shadow:0 8px 32px rgba(0,0,0,.12);
  opacity:0;pointer-events:none;
  transform:translateX(-50%) translateY(6px) scale(.96);
  transition:all .3s cubic-bezier(.22,1,.36,1);
  z-index:100;text-align:left;
}
.esc-detail::after{
  content:'';position:absolute;bottom:-7px;left:50%;
  width:12px;height:12px;background:#fff;
  border-bottom:1.5px solid var(--sc,hsl(244 76% 59%));
  border-right:1.5px solid var(--sc,hsl(244 76% 59%));
  transform:translateX(-50%) rotate(45deg);
}
.eccsr-step-card.active .esc-detail{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0) scale(1)}

/* ── ECCSR HERO SVG STAIR ── */
.eccsr-stair-wrap{position:relative;width:340px;height:300px}
.eccsr-stair-svg{width:100%;height:100%;overflow:visible}
.stair-block{transition:all .3s}
.sb1{fill:hsl(244 76% 94%);stroke:hsl(244 76% 59%);stroke-width:2;animation:blockRise .7s cubic-bezier(.22,1,.36,1) .05s both}
.sb2{fill:hsl(263 70% 94%);stroke:hsl(263 70% 55%);stroke-width:2;animation:blockRise .7s cubic-bezier(.22,1,.36,1) .15s both}
.sb3{fill:hsl(330 81% 95%);stroke:hsl(330 81% 60%);stroke-width:2;animation:blockRise .7s cubic-bezier(.22,1,.36,1) .25s both}
.sb4{fill:hsl(160 84% 92%);stroke:hsl(160 84% 39%);stroke-width:2;animation:blockRise .7s cubic-bezier(.22,1,.36,1) .35s both}
.sb5{fill:hsl(21 94% 94%);stroke:hsl(21 94% 53%);stroke-width:2;animation:blockRise .7s cubic-bezier(.22,1,.36,1) .45s both}
@keyframes blockRise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.stair-line{fill:none;stroke:rgba(79,70,229,.2);stroke-width:1.5;stroke-dasharray:4 3}
.stair-letter{font-family:'Fraunces',Georgia,serif;font-size:26px;font-weight:900;dominant-baseline:text-after-edge;text-anchor:middle}
.sl1{fill:hsl(244 76% 59%);animation:letterPop .6s cubic-bezier(.34,1.56,.64,1) .2s both}
.sl2{fill:hsl(263 70% 55%);animation:letterPop .6s cubic-bezier(.34,1.56,.64,1) .35s both}
.sl3{fill:hsl(330 81% 60%);animation:letterPop .6s cubic-bezier(.34,1.56,.64,1) .5s both}
.sl4{fill:hsl(160 84% 39%);animation:letterPop .6s cubic-bezier(.34,1.56,.64,1) .65s both}
.sl5{fill:hsl(21 94% 53%);animation:letterPop .6s cubic-bezier(.34,1.56,.64,1) .8s both}
@keyframes letterPop{from{opacity:0;transform:translateY(10px) scale(.7)}to{opacity:1;transform:none}}
.stair-word{font-family:'JetBrains Mono',monospace;font-size:9px;fill:rgba(15,14,23,.45);dominant-baseline:text-before-edge}
.stair-dot{fill:hsl(244 76% 59%);filter:drop-shadow(0 0 5px hsl(244 76% 59%))}
.step-dot{fill:white;stroke-width:2}

/* ══ HERO IRIDESCENT BACKGROUND (exact Lovable) ══ */
.hero-iridescent-bg{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 80% at 80% 50%, rgba(255,160,100,.45) 0%, rgba(255,100,160,.3) 30%, rgba(180,120,255,.2) 60%, transparent 80%),
    radial-gradient(ellipse 50% 60% at 60% 20%, rgba(255,120,180,.35) 0%, rgba(200,160,255,.2) 50%, transparent 70%),
    radial-gradient(ellipse 40% 50% at 90% 80%, rgba(255,140,80,.3) 0%, transparent 60%),
    linear-gradient(135deg, #fff 0%, #fdf6ff 30%, #fff5f0 60%, #fffaf0 100%);
}
.hero-left-fade{position:absolute;inset-y:0;left:0;width:45%;background:linear-gradient(to right,#fff 0%,rgba(255,255,255,.6) 60%,transparent 100%);pointer-events:none;z-index:1}

/* ══ PM ICONS SCENE ══ */
.pm-icons-scene{position:relative;width:100%;height:520px;perspective:800px;overflow:hidden}

/* 3D background blocks */
.pmi-block{position:absolute;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.pmi-block-blue{
  width:200px;height:200px;background:linear-gradient(145deg,hsl(244 76% 58%),hsl(244 76% 42%));
  left:42%;top:22%;
  transform:rotateX(-10deg) rotateY(-15deg);
  animation:blockFloat1 7s ease-in-out infinite;
}
.pmi-block-orange{
  width:160px;height:160px;background:linear-gradient(145deg,hsl(21 94% 58%),hsl(21 94% 42%));
  left:55%;top:48%;
  transform:rotateX(-8deg) rotateY(12deg);
  animation:blockFloat2 8s ease-in-out infinite .8s;
}
.pmi-block-green{
  width:90px;height:90px;background:linear-gradient(145deg,hsl(160 84% 45%),hsl(160 84% 30%));
  left:74%;top:15%;
  animation:blockFloat3 6s ease-in-out infinite 1.4s;
}
.pmi-block-grey{
  width:120px;height:120px;background:linear-gradient(145deg,#9ca3af,#6b7280);
  left:34%;top:60%;
  animation:blockFloat1 9s ease-in-out infinite 2s;
}
@keyframes blockFloat1{0%,100%{transform:rotateX(-10deg) rotateY(-15deg) translateY(0)}50%{transform:rotateX(-14deg) rotateY(-10deg) translateY(-18px)}}
@keyframes blockFloat2{0%,100%{transform:rotateX(-8deg) rotateY(12deg) translateY(0)}50%{transform:rotateX(-12deg) rotateY(8deg) translateY(-14px)}}
@keyframes blockFloat3{0%,100%{transform:translateY(0) rotate(6deg)}50%{transform:translateY(-12px) rotate(4deg)}}

/* PM Icon cards */
.pmi-card{
  position:absolute;
  background:rgba(255,255,255,.96);
  border-radius:14px;
  padding:12px 14px;
  box-shadow:0 8px 32px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.06);
  backdrop-filter:blur(10px);
  z-index:10;
  min-width:110px;
}
@keyframes pmFloat1{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-14px) rotate(1deg)}}
@keyframes pmFloat2{0%,100%{transform:translateY(0) rotate(2deg)}50%{transform:translateY(-10px) rotate(-1deg)}}
@keyframes pmFloat3{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-16px) rotate(1deg)}}

.pmi-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;color:rgba(15,14,23,.5);text-transform:uppercase;margin-bottom:6px}
.pmi-dots{display:flex;gap:4px;margin-bottom:8px}
.pmi-dots span{width:8px;height:8px;border-radius:50%}

/* Planner calendar */
.pmi-cal{display:flex;flex-direction:column;gap:3px}
.pmi-cal-row{display:flex;gap:3px}
.pmi-cal-cell{width:12px;height:10px;border-radius:2px;background:#f3f4f6}
.pmi-cal-cell.head{background:#e5e7eb;height:7px}
.pmi-cal-cell.fill{opacity:.85}

/* Budget */
.pmi-budget-num{font-family:var(--serif);font-size:1.4rem;font-weight:700;color:#fff;line-height:1;margin-bottom:8px}
.pmi-bars{display:flex;align-items:flex-end;gap:3px;height:42px;overflow:hidden;max-height:42px}
.pmi-bar{width:12px;border-radius:3px 3px 0 0;background:#4f46e5;flex-shrink:0}
.pmi-card:has(.pmi-budget-num){background:hsl(244 76% 55%);padding:14px 16px}

/* Kanban */
.pmi-kanban{display:flex;flex-direction:column;gap:4px;padding-top:2px}
.pmi-krow{height:8px;border-radius:4px}

/* Risk */
.pmi-risk-grid{display:grid;grid-template-columns:repeat(3,20px);gap:3px}
.pmi-rg-cell{width:20px;height:16px;border-radius:3px}

/* Gantt */
.pmi-gantt{display:flex;flex-direction:column;gap:5px;padding-top:2px}
.pmi-gantt-row{height:7px;background:#f3f4f6;border-radius:4px;position:relative;overflow:hidden}
.pmi-gantt-bar{position:absolute;top:0;bottom:0;border-radius:4px}

/* Team */
.pmi-team{display:flex;gap:-4px;margin-bottom:8px}
.pmi-avatar{width:28px;height:28px;min-width:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;border:2px solid #fff;margin-right:-4px}
.pmi-team-bar{height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden;margin-top:4px}

/* 70% ring */
.pmi-ring-card{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:90px}
.pmi-ring-pct{font-family:var(--serif);font-size:1rem;font-weight:700;color:#4f46e5}

/* Clock */
.pmi-clock-card{padding:14px;min-width:80px;display:flex;align-items:center;justify-content:center}

/* ── NAV DROPDOWN ── */
.nav-hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;background:none;border:none;cursor:pointer;padding:8px;flex-shrink:0;width:36px;height:36px}
.nav-hamburger span{display:block;width:20px;height:2px;background:var(--text);border-radius:2px;transition:all .3s;transform-origin:center}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.nav-dropdown{
  display:none;
  position:absolute;
  top:100%;left:0;right:0;
  background:rgba(255,255,255,.98);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  box-shadow:0 12px 40px rgba(0,0,0,.12);
  padding:.75rem 1.25rem;
  flex-direction:column;gap:2px;
  z-index:10;
  max-height:80vh;overflow-y:auto;
}
.nav-dropdown.open{display:flex}
.nav-dropdown a{
  color:var(--text);font-size:14px;font-weight:500;
  text-decoration:none;padding:10px 14px;
  border-radius:8px;transition:background .15s,color .15s;
  display:flex;align-items:center;gap:8px;
}
.nav-dropdown a:hover{background:var(--light);color:var(--indigo)}
@media(max-width:820px){
  .nav-links{display:none!important}
  .nav-pill{display:none!important}
  .nav-hamburger{display:flex!important}
}

/* ── YOUR MEDIA SLOT ── */
.video-section{margin:2.5rem 0}
.your-media-slot{background:linear-gradient(135deg,#f5f3ff,#eef2ff);border:1.5px dashed hsl(244 76% 75%);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem}
.ym-label{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.ym-badge{background:hsl(244 76% 59%);color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 10px;border-radius:99px;letter-spacing:.08em}
.ym-text{font-family:var(--mono);font-size:11px;color:hsl(244 76% 45%);font-weight:600}
.ym-upload-area{background:rgba(255,255,255,.7);border-radius:10px;padding:1.25rem;text-align:center;cursor:pointer;transition:background .2s}
.ym-upload-area:hover{background:rgba(255,255,255,.95)}
.ym-icon{font-size:2rem;margin-bottom:.5rem}
.ym-upload-text{font-weight:700;color:var(--text);font-size:14px;margin-bottom:4px}
.ym-upload-sub{font-size:12px;color:var(--muted);margin-bottom:1rem}
.ym-url-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:13px;outline:none;background:#fff;margin-bottom:.75rem;display:block}
.ym-url-input:focus{border-color:hsl(244 76% 59%)}
.ym-btn{background:hsl(244 76% 59%);color:#fff;border:none;padding:10px 24px;border-radius:99px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.ym-btn:hover{background:#3730a3;transform:translateY(-1px)}
.embedded-media{width:100%;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.embedded-media audio{width:100%;accent-color:hsl(244 76% 59%)}

/* ═══ SMOOTH SCROLL ═══ */
html{scroll-behavior:smooth}
.spa-scroll{scroll-behavior:smooth}

/* ═══ CUSTOM CURSOR ═══ */
@media(pointer:fine){body{cursor:none}}
#cursor{position:fixed;width:10px;height:10px;background:hsl(244 76% 59%);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:transform .1s;mix-blend-mode:multiply}
#cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid rgba(79,70,229,.4);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:left .12s ease,top .12s ease}
body:has(a:hover) #cursor-ring,body:has(button:hover) #cursor-ring{width:52px;height:52px;border-color:hsl(244 76% 59%)}

/* ═══ NOISE TEXTURE OVERLAY ═══ */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9997;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' result='noise'/%3E%3C/filter%3E%3Crect width='200' height='200' fill='%23000' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
}

/* ═══ GRADIENT MESH SECTIONS ═══ */
.mesh-bg{position:relative;overflow:hidden}
.mesh-bg::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 10% 20%, rgba(99,91,255,.06) 0%, transparent 50%),
    radial-gradient(ellipse 40% 60% at 90% 80%, rgba(249,115,22,.05) 0%, transparent 50%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(236,72,153,.03) 0%, transparent 60%);}

/* ═══ FLOATING PARTICLES ═══ */
.particle{position:absolute;border-radius:50%;pointer-events:none;animation:particleDrift linear infinite}
@keyframes particleDrift{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100px) rotate(720deg);opacity:0}}

/* ═══ GLASSMORPHISM CARDS ═══ */
.glass-card{background:rgba(255,255,255,.7);backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(255,255,255,.8);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8)}

/* ═══ GRADIENT TEXT ═══ */
.grad-text{background:linear-gradient(135deg,hsl(244 76% 59%) 0%,hsl(330 81% 60%) 50%,hsl(21 94% 53%) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.grad-text-2{background:linear-gradient(135deg,hsl(160 84% 39%) 0%,hsl(244 76% 59%) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ═══ ECCSR BADGE ═══ */
.eccsr-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;padding:4px 10px;border-radius:99px;text-transform:uppercase}
.eb-e{background:rgba(79,70,229,.1);color:hsl(244 76% 59%);border:1px solid rgba(79,70,229,.2)}
.eb-c{background:rgba(124,58,237,.1);color:hsl(263 70% 55%);border:1px solid rgba(124,58,237,.2)}
.eb-c2{background:rgba(236,72,153,.1);color:hsl(330 81% 60%);border:1px solid rgba(236,72,153,.2)}
.eb-s{background:rgba(16,185,129,.1);color:hsl(160 84% 39%);border:1px solid rgba(16,185,129,.2)}
.eb-r{background:rgba(249,115,22,.1);color:hsl(21 94% 53%);border:1px solid rgba(249,115,22,.2)}

/* ═══ PROMPT CARD ═══ */
.prompt-card{background:#1f2937;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.prompt-header{padding:.75rem 1rem;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.06)}
.prompt-dots span{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px}
.prompt-title{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.1em}
.prompt-body{padding:1.25rem;font-family:var(--mono);font-size:12px;color:rgba(255,255,255,.8);line-height:1.8;white-space:pre-wrap}
.prompt-body .ph{color:hsl(160 84% 55%)}
.prompt-body .kw{color:hsl(244 76% 75%)}
.prompt-body .comment{color:rgba(255,255,255,.35);font-style:italic}
.copy-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.6);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.copy-btn:hover{background:rgba(79,70,229,.3);color:#fff}
.copy-btn.copied{background:rgba(16,185,129,.2);color:hsl(160 84% 55%)}

/* ═══ IRISH EXAMPLE BOX ═══ */
.irish-box{background:linear-gradient(135deg,rgba(255,255,255,.9),rgba(245,243,255,.9));border:1px solid rgba(79,70,229,.12);border-left:4px solid hsl(244 76% 59%);border-radius:0 14px 14px 0;padding:1.5rem 2rem;margin:2rem 0;position:relative;overflow:hidden}
.irish-box::before{content:'🇮🇪';position:absolute;top:.875rem;right:1rem;font-size:1.4rem;opacity:.6}
.irish-box-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:hsl(244 76% 59%);margin-bottom:.5rem}
.irish-box p{font-size:14px;color:#374151;line-height:1.7;margin:0;font-style:italic}

/* ═══ STAT COUNTER CARDS ═══ */
.stat-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:99px;padding:8px 18px;backdrop-filter:blur(10px)}
.stat-pill-n{font-family:var(--serif);font-size:1.4rem;font-weight:700;color:#fff;font-style:italic}
.stat-pill-l{font-size:12px;color:rgba(255,255,255,.55)}

/* ═══ TOOL COMPARISON TABLE ═══ */
.tool-table{width:100%;border-collapse:separate;border-spacing:0;margin:2rem 0}
.tool-table th{background:#1f2937;color:rgba(255,255,255,.6);text-align:left;padding:12px 16px;font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase}
.tool-table th:first-child{border-radius:10px 0 0 0}
.tool-table th:last-child{border-radius:0 10px 0 0}
.tool-table td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:13px;transition:background .15s}
.tool-table tr:hover td{background:var(--light)}
.tool-table .check{color:hsl(160 84% 39%);font-weight:700}
.tool-table .cross{color:rgba(0,0,0,.25)}
.tool-table .free-badge{background:rgba(16,185,129,.1);color:hsl(160 84% 39%);border:1px solid rgba(16,185,129,.2);font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px}

/* ═══ HOVER LIFT ═══ */
.hover-lift{transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s ease}
.hover-lift:hover{transform:translateY(-6px) scale(1.01);box-shadow:0 20px 60px rgba(79,70,229,.15)}

/* ═══ GLOW BUTTON ═══ */
.btn-glow{position:relative;overflow:hidden}
.btn-glow::after{content:'';position:absolute;inset:-2px;background:linear-gradient(135deg,hsl(244 76% 59%),hsl(330 81% 60%),hsl(21 94% 53%));border-radius:inherit;z-index:-1;opacity:0;transition:opacity .3s}
.btn-glow:hover::after{opacity:.6}

/* ═══ SECTION TRANSITION ═══ */
.section-wave{position:relative}
.section-wave::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:60px;background:inherit;clip-path:ellipse(55% 60% at 50% 100%)}

/* ═══ COUNTER ANIMATION ═══ */
.count-up{display:inline-block}

/* ═══ TIMELINE ═══ */
.timeline{position:relative;padding-left:2.5rem}
.timeline::before{content:'';position:absolute;left:.75rem;top:0;bottom:0;width:2px;background:linear-gradient(180deg,hsl(244 76% 59%),hsl(330 81% 60%),hsl(21 94% 53%))}
.tl-item{position:relative;margin-bottom:2rem}
.tl-dot{position:absolute;left:-1.75rem;top:.3rem;width:12px;height:12px;border-radius:50%;background:hsl(244 76% 59%);border:2px solid #fff;box-shadow:0 0 0 3px rgba(79,70,229,.2);animation:dotPulse 2.4s ease-in-out infinite}
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 3px rgba(79,70,229,.2)}50%{box-shadow:0 0 0 6px rgba(79,70,229,.08)}}
.tl-label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;color:hsl(244 76% 59%);text-transform:uppercase;margin-bottom:4px}
.tl-title{font-family:var(--serif);font-size:1.15rem;font-weight:700;color:var(--text);margin-bottom:.375rem}
.tl-text{font-size:14px;color:var(--muted);line-height:1.7}

/* ═══ ANIMATED NUMBER ═══ */
@keyframes countUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ═══ CARD HOVER 3D ═══ */
.card-3d{transform-style:preserve-3d;transition:transform .4s cubic-bezier(.22,1,.36,1)}
.card-3d:hover{transform:perspective(800px) rotateY(-5deg) rotateX(3deg) translateY(-8px)}

/* ═══ TAG ROW ═══ */
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin:1rem 0}
.tag{font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 12px;border-radius:99px;letter-spacing:.06em}

/* ═══ SHIMMER LOADING ═══ */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* ═══ GRADIENT BORDER ═══ */
.grad-border{position:relative;border-radius:16px}
.grad-border::before{content:'';position:absolute;inset:-2px;border-radius:18px;background:linear-gradient(135deg,hsl(244 76% 59%),hsl(330 81% 60%),hsl(21 94% 53%));z-index:-1;opacity:.6}

/* ═══ RICH CHAPTER STYLES ═══ */

/* Section alternating backgrounds - rich, not plain */
.content-section:nth-child(odd){background:#ffffff}
.content-section:nth-child(even){background:linear-gradient(160deg,#f8faff 0%,#f3f0ff 100%)}

/* Chapter hero accent line */
.ph::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pa,hsl(244 76% 59%)),transparent);opacity:.5}

/* RICH CONTENT CARDS - replaces plain h3+p */
.rich-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:1.75rem;position:relative;overflow:hidden;transition:all .3s cubic-bezier(.22,1,.36,1);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.rich-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--card-accent,hsl(244 76% 59%)),var(--card-accent2,hsl(263 70% 55%)));transform:scaleX(0);transition:transform .3s;transform-origin:left}
.rich-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.09);border-color:var(--card-accent,hsl(244 76% 59%))}
.rich-card:hover::before{transform:scaleX(1)}
.rc-icon{font-size:2rem;margin-bottom:.875rem;display:block;filter:drop-shadow(0 3px 6px rgba(0,0,0,.12))}
.rc-tag{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border-radius:99px;display:inline-flex;margin-bottom:.75rem}
.rc-title{font-family:var(--serif);font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:.5rem;line-height:1.2}
.rc-text{font-size:13px;color:var(--muted);line-height:1.7;margin:0}

/* STAT HIGHLIGHT BOXES */
.stat-highlight{background:linear-gradient(135deg,var(--sh-bg1,hsl(244 76% 97%)),var(--sh-bg2,hsl(244 76% 94%)));border:1px solid var(--sh-border,rgba(79,70,229,.15));border-radius:16px;padding:1.75rem;text-align:center}
.sh-number{font-family:var(--serif);font-size:2.8rem;font-weight:700;color:var(--sh-color,hsl(244 76% 59%));line-height:1;font-style:italic;letter-spacing:-.02em}
.sh-label{font-size:13px;color:var(--muted);margin-top:.5rem;line-height:1.5;font-weight:500}
.sh-source{font-family:var(--mono);font-size:9px;color:rgba(15,14,23,.3);margin-top:.375rem;letter-spacing:.06em}

/* KEY CONCEPT PULLOUT */
.pullout{border-left:4px solid var(--pa,hsl(244 76% 59%));background:linear-gradient(135deg,rgba(79,70,229,.04),rgba(79,70,229,.01));border-radius:0 14px 14px 0;padding:1.5rem 2rem;margin:2.5rem 0}
.pullout-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--pa,hsl(244 76% 59%));margin-bottom:.625rem}
.pullout blockquote{font-family:var(--serif);font-size:1.3rem;font-weight:300;font-style:italic;color:var(--text);line-height:1.4;margin:0}
.pullout-source{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:.625rem}

/* STEP-BY-STEP PROCESS */
.process-steps{display:flex;flex-direction:column;gap:0;margin:2.5rem 0}
.process-step{display:flex;gap:1.25rem;padding:1.25rem 0;border-bottom:1px solid var(--border-soft);position:relative}
.process-step:last-child{border-bottom:none}
.ps-num{width:36px;height:36px;min-width:36px;border-radius:50%;background:var(--pa,hsl(244 76% 59%));color:#fff;font-family:var(--mono);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.ps-content{}
.ps-title{font-family:var(--serif);font-size:1rem;font-weight:700;color:var(--text);margin-bottom:.3rem}
.ps-text{font-size:13px;color:var(--muted);line-height:1.65;margin:0}

/* COMPARISON TABLE */
.compare-table{width:100%;border-collapse:separate;border-spacing:0;margin:2rem 0;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.compare-table th{background:var(--text);color:rgba(255,255,255,.7);padding:11px 16px;font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;text-align:left}
.compare-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;background:#fff;transition:background .15s}
.compare-table tr:last-child td{border-bottom:none}
.compare-table tr:hover td{background:var(--light)}
.compare-table .tick{color:hsl(160 84% 39%);font-weight:700}
.compare-table .cross{color:rgba(0,0,0,.2)}

/* ACCORDION / EXPANDABLE */
.accordion-item{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:8px;transition:box-shadow .2s}
.accordion-item:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.accordion-header{padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#fff;gap:12px;user-select:none}
.accordion-header:hover{background:var(--light)}
.ah-title{font-family:var(--serif);font-size:1.05rem;font-weight:700;color:var(--text)}
.ah-badge{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;padding:3px 9px;border-radius:99px;flex-shrink:0}
.ah-chevron{font-size:12px;color:var(--muted);transition:transform .3s;flex-shrink:0}
.accordion-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.22,1,.36,1)}
.accordion-body.open{max-height:600px}
.accordion-body-inner{padding:1.25rem;border-top:1px solid var(--border);font-size:14px;color:#374151;line-height:1.8;background:linear-gradient(160deg,#fafbff,#fff)}

/* HIGHLIGHT BAND */
.highlight-band{background:linear-gradient(135deg,var(--pa,hsl(244 76% 59%)),var(--pa2,hsl(263 70% 55%)));border-radius:16px;padding:2rem;color:#fff;margin:2.5rem 0;position:relative;overflow:hidden}
.highlight-band::before{content:'';position:absolute;top:-30%;right:-10%;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.08)}
.hb-label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:.625rem}
.hb-text{font-family:var(--serif);font-size:1.25rem;font-weight:300;font-style:italic;line-height:1.45;position:relative}
.hb-source{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.45);margin-top:.625rem;position:relative}

/* MINI STATS ROW */
.mini-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:2rem 0}
.ms-item{background:linear-gradient(135deg,var(--ms-bg1,hsl(244 76% 97%)),var(--ms-bg2,hsl(244 76% 94%)));border:1px solid var(--ms-border,rgba(79,70,229,.12));border-radius:12px;padding:1.25rem;text-align:center}
.ms-n{font-family:var(--serif);font-size:2rem;font-weight:700;color:var(--ms-color,hsl(244 76% 59%));line-height:1;font-style:italic}
.ms-l{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4}

/* GRID LAYOUT for card sections */
.chapter-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin:2.5rem 0}
.chapter-card-grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin:2.5rem 0}

/* SCROLL REVEAL for content items */
.fade-up{opacity:0;transform:translateY(30px);transition:opacity .6s cubic-bezier(.16,1,.3,1),transform .6s cubic-bezier(.16,1,.3,1)}
.fade-up.visible{opacity:1;transform:none}
.fade-left{opacity:0;transform:translateX(-24px);transition:opacity .6s cubic-bezier(.16,1,.3,1),transform .6s cubic-bezier(.16,1,.3,1)}
.fade-left.visible{opacity:1;transform:none}
.scale-in{opacity:0;transform:scale(.94);transition:opacity .5s ease,transform .5s ease}
.scale-in.visible{opacity:1;transform:scale(1)}

/* Stagger delays for grid items */
.chapter-card-grid>.rich-card:nth-child(1){transition-delay:.04s}
.chapter-card-grid>.rich-card:nth-child(2){transition-delay:.10s}
.chapter-card-grid>.rich-card:nth-child(3){transition-delay:.16s}
.chapter-card-grid>.rich-card:nth-child(4){transition-delay:.22s}
.chapter-card-grid>.rich-card:nth-child(5){transition-delay:.28s}
.chapter-card-grid>.rich-card:nth-child(6){transition-delay:.34s}

/* Chapter section heading style */
.section-heading{display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.5rem}
.sh-accent-bar{width:4px;min-height:100%;background:linear-gradient(180deg,var(--pa,hsl(244 76% 59%)),transparent);border-radius:2px;align-self:stretch;min-height:60px}

/* ══ LOVABLE: Stripe ribbon iridescent hero backdrop ══ */
.stripe-ribbon-wrap{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.stripe-ribbon{
  position:absolute;top:-20%;right:-10%;width:75%;height:140%;
  background:conic-gradient(from 200deg at 60% 40%,
    rgba(255,150,100,.55) 0deg,
    rgba(255,100,180,.45) 60deg,
    rgba(180,120,255,.35) 120deg,
    rgba(100,180,255,.25) 180deg,
    rgba(255,200,100,.3) 240deg,
    rgba(255,150,100,.55) 360deg);
  filter:blur(60px);
  animation:ribbonSpin 18s linear infinite;
  border-radius:40%;
}
@keyframes ribbonSpin{from{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.1)}to{transform:rotate(360deg) scale(1)}}

/* ══ LOVABLE: ambient blobs on ECCSR section ══ */
.ambient-blob{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none;animation:ambPulse 10s ease-in-out infinite}
.ambient-blob.indigo{background:radial-gradient(circle,rgba(79,70,229,.2),transparent 70%)}
.ambient-blob.coral{background:radial-gradient(circle,rgba(249,115,22,.15),transparent 70%)}
.ambient-ring{position:absolute;border-radius:50%;border:1.5px solid rgba(79,70,229,.1);pointer-events:none}
.spin-slow{animation:spinSlow 22s linear infinite}
@keyframes ambPulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.15);opacity:1}}
@keyframes spinSlow{to{transform:rotate(360deg)}}
</style>
</head>
